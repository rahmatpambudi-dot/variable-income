name: Update Variable Income Dashboard

on:
  workflow_dispatch:
    inputs:
      note:
        description: 'Catatan update (opsional)'
        required: false
        default: 'Manual update'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install gspread google-auth

      - name: Run extract script
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          SHEET_ID_OT: ${{ secrets.SHEET_ID_OT }}
          SHEET_ID_INSENTIF: ${{ secrets.SHEET_ID_INSENTIF }}
        run: python scripts/extract_data.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard_variable_income.html
          git diff --staged --quiet || git commit -m "Auto-update dashboard [$(TZ='Asia/Jakarta' date '+%d %b %Y %H:%M WIB')]"
          git push
