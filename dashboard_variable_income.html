<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NDC & RDC — Performance Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
:root {
  --sw: 220px; --bg: #eef2f7; --white: #fff; --border: #dde3ec;
  --text: #1a1d23; --t2: #5f6368; --t3: #9aa0a6;
  --green: #1e7e4e; --gbg: #e8f5ee; --gm: #34a85a; --gl: #81c995;
  --blue: #1a73e8; --bbg: #e8f0fe;
  --red: #d93025; --rbg: #fce8e6;
  --orange: #e37400; --obg: #fef3e2;
  --shadow: 0 1px 3px rgba(0,0,0,.08); --shadow-md: 0 4px 12px rgba(0,0,0,.08);
  --r: 10px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;font-size:13px;}

/* SIDEBAR */
.sidebar{width:var(--sw);background:#1e2a3a;border-right:none;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:10;overflow-y:auto;}
.s-logo{padding:18px 16px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:10px;}
.s-icon{width:32px;height:32px;background:var(--green);border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px;flex-shrink:0;}
.s-title{font-weight:700;font-size:13px;color:#fff;}.s-sub{font-size:10px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.8px;}
.s-sec{padding:14px 12px 6px;}
.s-lbl{font-size:10px;font-weight:600;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px;padding:0 4px;margin-bottom:4px;}
.s-item{display:flex;align-items:center;justify-content:space-between;padding:7px 8px;border-radius:6px;cursor:pointer;transition:all .15s;color:rgba(255,255,255,.65);font-size:12.5px;}
.s-item:hover{background:rgba(255,255,255,.07);}
.s-item.active{background:rgba(255,255,255,.12);color:#fff;font-weight:600;}
.s-dot{width:7px;height:7px;border-radius:50%;background:var(--border);flex-shrink:0;margin-right:6px;}
.s-dot.ndc{background:#1a73e8;}.s-dot.rdc{background:#e37400;}
.s-badge{background:rgba(255,255,255,.15);color:rgba(255,255,255,.8);font-size:10px;padding:1px 6px;border-radius:10px;font-weight:600;}
.s-div{height:1px;background:rgba(255,255,255,.1);margin:6px 12px;}
.s-group{overflow:hidden;transition:max-height .25s ease;}
.s-group.collapsed{max-height:0;}
.s-group.expanded{max-height:400px;}
.s-item.parent{justify-content:space-between;}
.s-chevron{font-size:9px;opacity:.5;transition:transform .2s;flex-shrink:0;}
.s-chevron.open{transform:rotate(180deg);}
.s-sub-item{display:flex;align-items:center;padding:5px 8px 5px 22px;border-radius:6px;cursor:pointer;transition:all .15s;color:rgba(255,255,255,.5);font-size:12px;}
.s-sub-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.8);}
.s-sub-item.active{background:rgba(255,255,255,.1);color:#fff;font-weight:600;}
.s-sub-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.3);flex-shrink:0;margin-right:7px;}

/* MAIN */
.main{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;}

/* TOPBAR */
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:5;gap:10px;flex-wrap:wrap;}
.topbar h2{font-size:15px;font-weight:600;}
.topbar-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.btn-tog{display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.btn-tog button{padding:5px 12px;font-size:12px;font-weight:500;border:none;cursor:pointer;background:var(--white);color:var(--t2);font-family:'Inter',sans-serif;transition:all .15s;}
.btn-tog button.active{background:var(--green);color:#fff;}
.ctrl-lbl{font-size:11px;color:var(--t3);}
.date-in{border:1px solid var(--border);border-radius:6px;padding:5px 9px;font-size:12px;font-family:'Inter',sans-serif;color:var(--text);background:var(--white);outline:none;cursor:pointer;}
.date-in:focus{border-color:var(--green);}
.btn-apply{background:var(--green);color:#fff;border:none;padding:5px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;}
.btn-apply:hover{background:var(--gm);}
.s-filter{background:var(--gbg);border:1px solid var(--gl);color:var(--green);border-radius:6px;padding:5px 10px;font-size:12px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;outline:none;}
.upd-info{font-size:11px;color:var(--t3);}
.upd-info span{color:var(--t2);font-weight:500;}
.btn-ref{display:flex;align-items:center;gap:5px;padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:var(--white);font-size:12px;color:var(--t2);cursor:pointer;font-family:'Inter',sans-serif;}
.btn-ref:hover{background:var(--bg);}
.btn-ref svg{width:13px;height:13px;}

/* CONTENT */
.content{padding:20px 24px;flex:1;}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:12px;color:var(--t3);}
.spinner{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:18px;}
.kpi{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;box-shadow:var(--shadow);transition:box-shadow .2s;}
.kpi:hover{box-shadow:var(--shadow-md);}
.kpi .lbl{font-size:9px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px;}
.kpi .val{font-size:21px;font-weight:700;color:var(--text);font-family:'JetBrains Mono',monospace;line-height:1;}
.kpi .val.green{color:var(--green);}.kpi .val.red{color:var(--red);}.kpi .val.blue{color:var(--blue);}
.kpi .sub{font-size:10px;color:var(--t3);margin-top:4px;}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px;}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px;margin-bottom:14px;}
@media(max-width:1200px){.g3{grid-template-columns:1fr 1fr;}.g4{grid-template-columns:1fr 1fr;}}
@media(max-width:800px){.g2,.g3,.g4{grid-template-columns:1fr;}}

/* PANEL */
.panel{background:var(--white);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;}
.ph{padding:13px 16px 11px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.ph h3{font-size:13px;font-weight:600;}
.ph .tag{font-size:10px;color:var(--t3);background:var(--bg);border:1px solid var(--border);padding:2px 7px;border-radius:10px;}
.pb{padding:14px 16px;}

/* TABLE */
.tw{overflow-x:auto;}
.dt{width:100%;border-collapse:collapse;font-size:12px;font-variant-numeric:tabular-nums;}
.dt thead th{padding:8px 11px;text-align:left;font-weight:600;font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;border-bottom:2px solid var(--border);white-space:nowrap;background:var(--bg);}
.dt tbody td{padding:7px 11px;border-bottom:1px solid var(--border);color:var(--text);white-space:nowrap;font-variant-numeric:tabular-nums;}
.dt tbody tr:last-child td{border-bottom:none;}
.dt tbody tr.sum{background:var(--gbg);font-weight:600;}
.dt tbody tr.sum td{color:var(--green);border-top:2px solid var(--gl);border-bottom:none;}
.dt tbody tr:not(.sum):hover td{background:var(--bg);}
.num{text-align:right;font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums;letter-spacing:-.3px;}
.bg{background:var(--gbg);color:var(--green);padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;}
.bm{background:var(--obg);color:var(--orange);padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;}
.br{background:var(--rbg);color:var(--red);padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;}

/* BARS */
.bars{display:flex;flex-direction:column;gap:9px;}
.bi .bh{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;}
.bi .bs{font-weight:500;}.bi .bv{font-weight:600;font-family:'JetBrains Mono',monospace;font-size:11px;}
.bt{height:6px;background:var(--bg);border-radius:3px;overflow:hidden;border:1px solid var(--border);}
.bf{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.4,0,.2,1);}
.bf.g{background:linear-gradient(90deg,var(--gl),var(--green));}
.bf.b{background:linear-gradient(90deg,#93c4fd,var(--blue));}
.bf.o{background:linear-gradient(90deg,#fcd980,var(--orange));}

/* DETAIL METRIK */
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
@media(max-width:900px){.metric-grid{grid-template-columns:1fr;}}
.trend-table .dt thead th{background:var(--white);}
.delta-up{color:var(--gm);font-weight:600;font-size:11px;}
.delta-dn{color:var(--red);font-weight:600;font-size:11px;}
.delta-nt{color:var(--t3);font-size:11px;}

canvas{display:block;}

/* MONTHLY TREND TABLE */
.mtt{width:100%;border-collapse:collapse;font-size:11px;font-variant-numeric:tabular-nums;}
.mtt th{background:var(--bg);color:var(--t3);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px;padding:7px 10px;border-bottom:1px solid var(--border);text-align:center;white-space:nowrap;position:sticky;top:0;z-index:1;}
.mtt th:first-child,.mtt th:nth-child(2){text-align:left;}
.mtt td{padding:6px 10px;border-bottom:0.5px solid var(--border);text-align:center;white-space:nowrap;}
.mtt td:first-child{text-align:left;font-weight:600;color:var(--text);}
.mtt td:nth-child(2){text-align:left;color:var(--t2);}
.mtt tr:last-child td{border-bottom:none;}
.mtt tr.sum-row td{background:var(--bg);font-weight:700;border-top:1px solid var(--border);}
.mtt .c-red{background:#fce8e6;color:#c0392b;font-weight:600;}
.mtt .c-yel{background:#fff8e1;color:#b06000;font-weight:600;}
.mtt .c-grn{background:#e8f5e9;color:#1e7e34;font-weight:600;}
.mtt .c-def{color:var(--text);}
.mtt .pct{font-size:9px;opacity:.75;}
.cmp-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.cmp-ctrl{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:12px 16px;background:var(--white);border:1px solid var(--border);border-radius:var(--r);margin-bottom:14px;}
.cmp-ctrl label{font-size:11px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.6px;}
.cmp-period{display:flex;align-items:center;gap:6px;}
.cmp-dot-a{width:8px;height:8px;border-radius:50%;background:#1a73e8;flex-shrink:0;}
.cmp-dot-b{width:8px;height:8px;border-radius:50%;background:#e37400;flex-shrink:0;}
.cmp-sep{color:var(--t3);font-size:11px;}
.btn-cmp{background:var(--green);color:#fff;border:none;padding:5px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;}
.btn-cmp:hover{background:var(--gm);}

/* ACHIEVEMENT */
.ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:14px;}
.ach-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;box-shadow:var(--shadow);}
.ach-card .ac-lbl{font-size:9px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;}
.ach-card .ac-val{font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1;}
.ach-card .ac-tgt{font-size:10px;color:var(--t3);margin-top:3px;}
.ach-card .ac-badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px;margin-top:5px;letter-spacing:.3px;}
.ac-badge.hit{background:var(--gbg);color:var(--green);}
.ac-badge.warn{background:#fff8e6;color:#b06000;}
.ac-badge.miss{background:var(--rbg);color:var(--red);}

/* DELTA */
.d-up{color:var(--gm);font-weight:600;font-size:11px;}
.d-dn{color:var(--red);font-weight:600;font-size:11px;}
.d-nt{color:var(--t3);font-size:11px;}
.arrow-up::before{content:'▲ ';}
.arrow-dn::before{content:'▼ ';}

/* INSIGHT TABLE */
.ins-tbl{table-layout:fixed;}
.ins-tbl thead th{background:var(--bg);}
.ins-tbl .col-a{color:#1a73e8;font-weight:600;}
.ins-tbl .col-b{color:#e37400;font-weight:600;}
.ins-tbl .gap-pos{color:var(--gm);font-weight:600;}
.ins-tbl .gap-neg{color:var(--red);font-weight:600;}

/* KESIMPULAN */
.kesimpulan{border-radius:var(--r);padding:14px 16px;margin-top:14px;}
.kesimpulan.baik{background:var(--gbg);border:1px solid var(--gl);}
.kesimpulan.evaluasi{background:#fff8e6;border:1px solid #f9c825;}
.kesimpulan h4{font-size:12px;font-weight:700;margin-bottom:8px;}
.kesimpulan ul{list-style:none;display:flex;flex-direction:column;gap:4px;}
.kesimpulan ul li{font-size:11px;color:var(--t2);}
.kesimpulan ul li::before{margin-right:6px;}
.kesimpulan.baik h4{color:var(--green);}
.kesimpulan.evaluasi h4{color:#b06000;}

/* TABS */
.tabs{display:flex;gap:2px;background:var(--bg);border-radius:7px;padding:3px;margin-bottom:16px;width:fit-content;}
.tab{padding:6px 16px;border-radius:5px;font-size:12px;font-weight:500;cursor:pointer;color:var(--t2);transition:all .15s;}
.tab.active{background:var(--white);color:var(--green);font-weight:600;box-shadow:var(--shadow);}
</style>
</head>

<script>
// ── STATE ──────────────────────────────────────────────────────
let ROWS = [];
let currentNav  = 'overview';
let currentSite = 'ALL';
let charts = {};
const SL = {
  JABABEKA:'Jababeka', CIKUPA:'Cikupa', SDA:'Sidoarjo', TALLO:'Tallo', TAMORA:'Tamora',
  JAB_HCI:'JAB - HCI', JAB_AHI:'JAB - AHI', JAB_FBI:'JAB - FBI', JAB_KLS:'JAB - KLS',

// ── BUILD MONTHLY FROM ROWS (fallback if data_monthly.json not available) ──
function buildMonthlyFromRows(rows) {
  var result = [];
  var months = [...new Set(rows.map(r=>r.date?r.date.slice(0,7):null).filter(Boolean))].sort();
  months.forEach(function(mo) {
    SITES.forEach(function(site) {
      var moRows = rows.filter(r=>r.site===site&&r.date&&r.date.slice(0,7)===mo);
      if(!moRows.length) return;
      var res = computeSite(moRows, site)||{};
      result.push({site:site, label:SL[site], month:mo,
        ritase:res.ritase, olf:res.olf, dpStore:res.dpStore, dpMix:res.dpMix,
        dpNonReg:res.dpNonReg, dpReg:res.dpReg, doTrip:res.doTrip, doDp:res.doDp,
        cbmDo:res.cbmDo, cbmDp:res.cbmDp, tatDirect:res.tatDirect, tatStore:res.tatStore});
    });
  });
  return result;
}

let MONTHLY = [];
let RAW_LOADED = false;

async function loadData() {
  document.getElementById('content').innerHTML = '<div class="loading"><div class="spinner"></div><p id="loadMsg">Memuat data...</p></div>';
  try {
    // Try data_monthly.json first (fast), fallback to data.json
    let usedMonthly = false;
    try {
      const mRes = await fetch('data_monthly.json?t=' + Date.now());
      if(mRes.ok) {
        const mJson = await mRes.json();
        MONTHLY = mJson.monthly || [];
        document.getElementById('updTime').textContent = mJson.timestamp || '14 May 2026 18:30 WIB';
        usedMonthly = true;
      }
    } catch(e2) {}

    // Always load data.json for full filter support
    const res = await fetch('data.json?t=' + Date.now());
    if (!res.ok) throw new Error('data.json not found. Pastikan GitHub Actions sudah dijalankan.');
    const json = await res.json();
    ROWS = json.rows || [];
    RAW_LOADED = true;
    if(!usedMonthly) {
      document.getElementById('updTime').textContent = json.timestamp || '14 May 2026 18:30 WIB';
      // Build MONTHLY from ROWS on the fly
      MONTHLY = buildMonthlyFromRows(ROWS);
    } else {
      document.getElementById('updTime').textContent = json.timestamp || document.getElementById('updTime').textContent;
    }
    render();
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="loading"><p style="color:var(--red)">⚠ '+e.message+'</p></div>';
  }
}

// ── DATE HELPERS ───────────────────────────────────────────────
function getRange() {
  const s = document.getElementById('startDate').value;
  const e = document.getElementById('endDate').value;
  return { start: s, end: e };
}

function filterRows(rows, start, end, site) {
  const sub = SUB_SITES[site];
  return rows.filter(r => {
    if (!r.date) return false;
    if (r.date < start || r.date > end) return false;
    if (sub) {
      // Sub-site: filter by base site + owner
      if (r.site !== sub.baseSite) return false;
      return sub.owners.some(o => (r.owner||'').toUpperCase() === o.toUpperCase());
    }
    if (site !== 'ALL') {
      if (site === 'JABABEKA') return r.site === 'JABABEKA';
      return r.site === site;
    }
    return true;
  });
}

// ── COMPUTE ────────────────────────────────────────────────────
function avg(a) { a=a.filter(x=>x!=null&&!isNaN(x)); return a.length?a.reduce((s,x)=>s+x,0)/a.length:null; }
function ssum(a){ return a.filter(x=>x!=null&&!isNaN(x)).reduce((s,x)=>s+x,0); }
function pf(v,d=2){ return v==null?'—':v.toFixed(d); }
function pp(v){ return v==null?'—':(v*100).toFixed(1)+'%'; }
function parseTAT(s){
  if(!s||s==='—')return null;
  s=s.toString().trim();
  // H:MM:SS or H:MM
  const m=s.match(/^(-?\d+):(\d{2})(?::(\d{2}))?$/);
  if(m) return +m[1]+parseInt(m[2])/60+(m[3]?parseInt(m[3]):0)/3600;
  // Excel fraction (0-2 = 0-48 hours)
  const n=parseFloat(s); if(!isNaN(n)&&n>0&&n<2)return n*24;
  return null;
}
function tatStr(h){
  if(h==null||isNaN(h))return'—';
  const t=Math.round(Math.abs(h)*3600);
  return `${Math.floor(t/3600)}:${String(Math.floor(t%3600/60)).padStart(2,'0')}:${String(t%60).padStart(2,'0')}`;
}

function computeSite(rows, site) {
  // If sub-site: resolve to base site for formula logic, rows already pre-filtered by owner
  const sub = SUB_SITES[site];
  const effectiveSite = sub ? sub.baseSite : site;

  const isJAB = effectiveSite === 'JABABEKA';
  const isCIK = effectiveSite === 'CIKUPA';
  const isSDA = effectiveSite === 'SDA';
  const isSub = !!sub; // sub-site = owner-specific view, no FBI exclusion

  // site rows (rows already filtered by filterRows, so just use effectiveSite for internal sub-filters)
  const sr = rows.filter(r => r.site === effectiveSite);

  // RITASE
  const ritRows = sr.filter(r =>
    r.td !== 'satelite' &&
    !(isCIK && (r.ja || '').toUpperCase() === 'MIN VAN OPS')
  );
  const byDate = {};
  ritRows.forEach(r => {
    if(!byDate[r.date]) byDate[r.date]={trips:new Set(),nopols:new Set()};
    byDate[r.date].trips.add(r.lc);
    if(r.nopol) byDate[r.date].nopols.add(r.nopol);
  });
  const ritVals = Object.values(byDate).map(v=>{
    return v.nopols.size>0 ? v.trips.size/v.nopols.size : null;
  }).filter(x=>x!=null);

  // For JABABEKA: exclude KLS sheet for all metrics except RITASE
  const srMain = isJAB ? sr.filter(r => r.sheet !== 'KLS JABABEKA') : sr;

  // OLF
  const olfR = srMain.filter(r => {
    if(r.td !== 'store') return false;
    if(!isSub && isJAB && r.sheet === 'AHI JABABEKA' && r.owner === 'FBI') return false;
    if(isJAB && r.kat !== 'REGULAR') return false;
    if(isCIK && !(r.od||'').includes('non cikande')) return false;
    if(!isSub && isSDA && (r.owner === 'FBI' || r.kat !== 'REGULAR')) return false;
    if(isSub && isSDA && r.kat !== 'REGULAR') return false;
    // TALLO/TAMORA: no kat filter (per manual formula)
    return true;
  });
  const oL = ssum(olfR.map(r=>parseFloat(r.cbm)||0));
  const oM = ssum(olfR.map(r=>parseFloat(r.cap)||0));

  // DP Store
  const dpSt = olfR.map(r=>parseFloat(r.dp)||0);

  // DP Mix
  const dpMx = srMain.filter(r => r.td==='customer' && (isSub || (!(isJAB&&r.owner==='FBI') && !(isSDA&&r.owner==='FBI')))).map(r=>parseFloat(r.dp)||0);

  // DP Non Reg
  const dpNR = srMain.filter(r => r.td==='customer' && r.kat==='NON REGULAR' && (isSub || (!(isJAB&&r.owner==='FBI') && !(isSDA&&r.owner==='FBI')))).map(r=>parseFloat(r.dp)||0);

  // Direct filter
  const drR = srMain.filter(r => {
    if(r.td !== 'customer') return false;
    if(r.ta === 'PICKUP') return false;
    if(r.kat !== 'REGULAR') return false;
    if(!isSub && isJAB && r.owner === 'FBI') return false;
    if(!isSub && isSDA && r.owner === 'FBI') return false;
    if(isCIK && !(r.sat||'').includes('NON SATELIT')) return false;
    return true;
  });
  const dpRg = drR.map(r=>parseFloat(r.dp)||0);
  const doTr = drR.map(r=>parseFloat(r.do)||0);
  const doDpK = ssum(drR.map(r=>parseFloat(r.do)||0));
  const doDpN = ssum(drR.map(r=>parseFloat(r.dp)||0));
  const cbmTotal = ssum(drR.map(r=>parseFloat(r.cbm)||0));

  // TAT Direct
  const tatD = srMain.filter(r => {
    if(r.td !== 'customer' || r.kat !== 'REGULAR') return false;
    if(isCIK) return (r.sat||'').includes('NON SATELIT');
    return r.sa.includes('DALAM KOTA');
  }).map(r=>parseTAT(r.tat)).filter(t=>t!=null&&t>=0&&t<=24);

  // TAT Store
  const tatS = srMain.filter(r => {
    if(r.td !== 'store' || r.kat !== 'REGULAR') return false;
    if(isCIK) return (r.sat||'').includes('NON SATELIT');
    return r.sa.includes('DALAM KOTA');
  }).map(r=>parseTAT(r.tat)).filter(t=>t!=null&&t>=0&&t<=(isCIK?12:24));

  // Total CBM Store (same filter as OLF)
  const totalCbmStore = ssum(olfR.map(r=>parseFloat(r.cbm)||0));

  // Total DO Customer & Total DP Customer (same filter as drR)
  const totalDoCust = ssum(drR.map(r=>parseFloat(r.do)||0));
  const totalDpCust = ssum(drR.map(r=>parseFloat(r.dp)||0));

  return {
    site, label: SL[site]||site,
    ritase: avg(ritVals), olf: oM>0?oL/oM:null,
    dpStore: avg(dpSt), dpMix: avg(dpMx), dpNonReg: avg(dpNR), dpReg: avg(dpRg),
    doTrip: avg(doTr), doDp: doDpN>0?doDpK/doDpN:null,
    cbmDo: doDpK>0?cbmTotal/doDpK:null,
    cbmDp: doDpN>0?cbmTotal/doDpN:null,
    tatDirect: avg(tatD), tatStore: avg(tatS),
    totalCbmStore, totalDoCust, totalDpCust,
    rowCount: sr.length,
  };
}

function computeAll(rows) {
  return SITES.map(s => computeSite(rows, s)).filter(Boolean);
}

function makeSummary(results) {
  const keys = ['ritase','olf','dpStore','dpMix','dpNonReg','dpReg','doTrip','doDp','cbmDo','cbmDp','tatDirect','tatStore'];
  const sumKeys = ['totalCbmStore','totalDoCust','totalDpCust'];
  return {
    site:'NDC & RDC', label:'NDC & RDC',
    ...Object.fromEntries(keys.map(k=>[k,avg(results.map(r=>r[k]))])),
    ...Object.fromEntries(sumKeys.map(k=>[k,ssum(results.map(r=>r[k]||0))])),
  };
}

function applyFilter() { render(); }
function onSiteChange() { currentSite = document.getElementById('siteSelect').value; updateSidebarActive(); render(); }

function handleSiteClick(site, grpId, e) {
  // Toggle expand/collapse
  const grp = document.getElementById(grpId);
  const chv = document.getElementById('chv-'+grpId);
  if(grp) {
    const isExpanded = grp.classList.contains('expanded');
    grp.classList.toggle('expanded', !isExpanded);
    grp.classList.toggle('collapsed', isExpanded);
    if(chv) chv.classList.toggle('open', !isExpanded);
  }
  // Also set site to corporate
  setSite(site);
}

function setSite(s) {
  currentSite = s;
  document.getElementById('siteSelect').value = s;
  // Expand parent group if sub-site selected
  if(SUB_SITES[s]) {
    const baseSite = SUB_SITES[s].baseSite;
    const grpId = baseSite === 'JABABEKA' ? 'grp-jab' : 'grp-sda';
    const grp = document.getElementById(grpId);
    const chv = document.getElementById('chv-'+grpId);
    if(grp) { grp.classList.add('expanded'); grp.classList.remove('collapsed'); }
    if(chv) chv.classList.add('open');
  }
  updateSidebarActive();
  render();
}

function updateSidebarActive() {
  // Clear all active states
  document.querySelectorAll('.s-item, .s-sub-item').forEach(el => el.classList.remove('active'));
  // Set active on matching site item
  const el = document.getElementById('site-'+currentSite);
  if(el) el.classList.add('active');
}
function setNav(n) {
  currentNav = n;
  document.querySelectorAll('.s-item[id^=nav]').forEach(el=>el.classList.remove('active'));
  document.getElementById('nav-'+n)?.classList.add('active');
  render();
}

function render() {
  const {start,end} = getRange();
  const filtered = filterRows(ROWS, start, end, currentSite);
  const isSub = !!SUB_SITES[currentSite];
  const results = currentSite === 'ALL' ? computeAll(filtered) : [computeSite(filtered, currentSite)];
  const summary = makeSummary(results);

  const d1 = new Date(start).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'});
  const d2 = new Date(end).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'});
  document.getElementById('topTitle').textContent = `${currentNav==='overview'?'Overview':'Detail Metrik'} — ${d1} s/d ${d2}`;

  Object.values(charts).forEach(c=>{ try{c.destroy()}catch(e){} });
  charts = {};

  if(currentNav === 'overview') renderOverview(results, summary, start, end);
  else renderDetail(results, summary, start, end);
}

function olfBadge(v) {
  if(v==null)return'—';

  if(p>=80)return`<span class="bm">${p.toFixed(1)}%</span>`;
  return`<span class="br">${p.toFixed(1)}%</span>`;
}

function renderBars(id, results, getFn, fmtFn, cls) {
  const vals = results.map(r=>getFn(r)||0);
  const max = Math.max(...vals);
  document.getElementById(id).innerHTML = results.map((r,i)=>`
    <div class="bi">
      <div class="bh"><span class="bs">${r.label}</span><span class="bv">${fmtFn(getFn(r))}</span></div>
      <div class="bt"><div class="bf ${cls}" style="width:${max>0?(vals[i]/max*100).toFixed(1):0}%"></div></div>
    </div>`).join('');
}

// ── ACHIEVEMENT HELPERS ────────────────────────────────────────
function getTarget(key, site) {
  const t = TARGETS[key];
  if(!t) return null;
  // For sub-sites, use parent site's target
  const effectiveSite = SUB_SITES[site] ? SUB_SITES[site].baseSite : site;
  if(t.targetBySite) return t.targetBySite[effectiveSite] || t.targetNational;
  return t.target;
}

function achPct(key, val, site) {
  const t = TARGETS[key];
  if(!t || val==null) return null;
  const tgt = getTarget(key, site);
  if(!tgt) return null;
  // For TAT (lower is better): achievement = target/actual * 100
  // For others (higher is better): achievement = actual/target * 100
  return t.dir==='up' ? (val/tgt*100) : (tgt/val*100);
}

function achBadge(key, val, site) {
  const pct = achPct(key, val, site);
  if(pct==null) return '';
  const cls = pct>=100 ? 'hit' : pct>=90 ? 'warn' : 'miss';
  return `<span class="ac-badge ${cls}">${pct.toFixed(1)}%</span>`;
}

function fmtDelta(vA, vB, key, higherIsBetter) {
  if(vA==null||vB==null) return '<span class="d-nt">—</span>';
  const d = vB - vA;
  const pct = vA!==0 ? (d/Math.abs(vA)*100) : 0;
  const up = d > 0;
  const good = higherIsBetter ? up : !up;
  const cls = d===0 ? 'd-nt' : (good ? 'd-up arrow-up' : 'd-dn arrow-dn');
  // for TAT show H:MM diff
  if(key==='tatDirect'||key==='tatStore') {
    const sign = d>=0?'+':'-';
    const abs = Math.abs(d);
    const h=Math.floor(abs); const m=Math.round((abs-h)*60);
    return `<span class="${cls}">${sign}${h}:${String(m).padStart(2,'0')}</span>`;
  }
  if(key==='olf') return `<span class="${cls}">${d>=0?'+':''}${(d*100).toFixed(1)}%</span>`;
  return `<span class="${cls}">${d>=0?'+':''}${Math.abs(d)<10?d.toFixed(2):d.toFixed(1)}</span>`;
}

// Higher is better for all except TAT
const HIGHER_BETTER = { olf:true, ritase:true, dpStore:true, dpMix:true, dpNonReg:false, dpReg:true, doTrip:true, doDp:true, cbmDo:true, cbmDp:true, tatDirect:false, tatStore:false };

function buildKesimpulan(resA, resB, sumA, sumB) {
  const lines = { baik:[], perhatian:[] };
  const checks = [
    { key:'olf',   label:'OLF Store',    tgt:0.85, dir:'up',   fmtV: v=>(v*100).toFixed(1)+'%', fmtT:'85%' },
    { key:'ritase',label:'Ritase',       tgtFn:(site)=>getTarget('ritase',site), dir:'up', fmtV:v=>v.toFixed(2) },
    { key:'dpMix', label:'DP Mix',       tgt:8.0,  dir:'up',   fmtV:v=>v.toFixed(1), fmtT:'8.0' },
    { key:'dpReg', label:'DP Reg',   tgt:8.0,  dir:'up',   fmtV:v=>v.toFixed(1), fmtT:'8.0' },
    { key:'doTrip',label:'DO/Trip',      tgt:11.0, dir:'up',   fmtV:v=>v.toFixed(1), fmtT:'11.0' },
  ];

  // Achievement vs target (period B)
  const site = currentSite==='ALL' ? null : currentSite;
  checks.forEach(c => {
    const val = site ? (resB.find(r=>r.site===site)||{})[c.key] : sumB[c.key];
    if(val==null) return;
    const tgt = c.tgtFn ? c.tgtFn(site||'JABABEKA') : c.tgt;
    const hit = c.dir==='up' ? val>=tgt : val<=tgt;
    if(hit) lines.baik.push(`${c.label} ${c.fmtV(val)} mencapai target ${c.fmtT||tgt}`);
    else lines.perhatian.push(`${c.label} ${c.fmtV(val)} belum mencapai target ${c.fmtT||tgt}`);
  });

  // MoM trend (if comparison data available)
  if(sumA && sumB) {
    const olfDelta = sumB.olf!=null&&sumA.olf!=null ? sumB.olf-sumA.olf : null;
    const tatDDelta = sumB.tatDirect!=null&&sumA.tatDirect!=null ? sumB.tatDirect-sumA.tatDirect : null;
    const tatSDelta = sumB.tatStore!=null&&sumA.tatStore!=null ? sumB.tatStore-sumA.tatStore : null;
    const doTDelta = sumB.doTrip!=null&&sumA.doTrip!=null ? sumB.doTrip-sumA.doTrip : null;
    const ritDelta = sumB.ritase!=null&&sumA.ritase!=null ? sumB.ritase-sumA.ritase : null;

    if(olfDelta!=null) {
      if(olfDelta>0) lines.baik.push(`OLF naik +${(olfDelta*100).toFixed(1)}% dibanding periode sebelumnya`);
      else if(olfDelta<-0.01) lines.perhatian.push(`OLF turun ${(olfDelta*100).toFixed(1)}% dibanding periode sebelumnya`);
    }
    if(tatDDelta!=null) {
      const h=Math.floor(Math.abs(tatDDelta)); const m=Math.round((Math.abs(tatDDelta)-h)*60);
      if(tatDDelta<0) lines.baik.push(`TAT Direct membaik ${h}:${String(m).padStart(2,'0')} jam lebih cepat`);
      else if(tatDDelta>0.1) lines.perhatian.push(`TAT Direct melambat +${h}:${String(m).padStart(2,'0')} jam`);
    }
    if(tatSDelta!=null) {
      const h=Math.floor(Math.abs(tatSDelta)); const m=Math.round((Math.abs(tatSDelta)-h)*60);
      if(tatSDelta<0) lines.baik.push(`TAT Store membaik ${h}:${String(m).padStart(2,'0')} jam lebih cepat`);
      else if(tatSDelta>0.1) lines.perhatian.push(`TAT Store melambat +${h}:${String(m).padStart(2,'0')} jam`);
    }
    if(doTDelta!=null) {
      if(doTDelta>0) lines.baik.push(`DO/Trip naik +${doTDelta.toFixed(1)} (lebih produktif)`);
      else if(doTDelta<-0.5) lines.perhatian.push(`DO/Trip turun ${doTDelta.toFixed(1)}`);
    }
    if(ritDelta!=null) {
      if(ritDelta>0) lines.baik.push(`Ritase naik +${ritDelta.toFixed(2)} (kepadatan armada membaik)`);
      else if(ritDelta<-0.02) lines.perhatian.push(`Ritase turun ${ritDelta.toFixed(2)}`);
    }
  }

  const isGood = lines.perhatian.length === 0 || lines.baik.length > lines.perhatian.length;
  const cls = lines.perhatian.length > lines.baik.length ? 'evaluasi' : 'baik';
  const title = lines.perhatian.length === 0 ? '✅ Operasional Efisien' : (lines.baik.length >= lines.perhatian.length ? '⚠️ Cukup Baik, Ada yang Perlu Diperhatikan' : '⚠️ Perlu Evaluasi');

  let html = `<div class="kesimpulan ${cls}"><h4>${title}</h4><ul>`;
  lines.baik.forEach(l => html += `<li>✓ ${l}</li>`);
  lines.perhatian.forEach(l => html += `<li>⚠ ${l}</li>`);
  html += '</ul></div>';
  return html;
}

function renderComparison() {
  const s1=cmpA.start, e1=cmpA.end, s2=cmpB.start, e2=cmpB.end;
  if(!s1||!e1||!s2||!e2) {
    document.getElementById('cmpResult').innerHTML = '<p style="color:var(--t3);font-size:12px;padding:12px">Pilih kedua periode lalu klik Bandingkan.</p>';

  }

  const rowsA = filterRows(ROWS, s1, e1, currentSite);
  const rowsB = filterRows(ROWS, s2, e2, currentSite);

  const resB = currentSite==='ALL' ? computeAll(rowsB) : [computeSite(rowsB, currentSite)];

  const sumB = makeSummary(resB);

    { key:'olf',      label:'OLF', fmtA:v=>v!=null?(v*100).toFixed(1)+'%':'—', fmtB:v=>v!=null?(v*100).toFixed(1)+'%':'—' },

    { key:'dpNonReg', label:'DP Non Reg' },
    { key:'dpReg',    label:'DP Reg' },
    { key:'doTrip',        label:'DO/Trip' },
    { key:'doDp',          label:'DO/DP Direct' },
    { key:'cbmDo',         label:'CBM/DO' },
    { key:'cbmDp',         label:'CBM/DP' },
    { key:'tatDirect',     label:'TAT Direct',   isTAT:true },
    { key:'tatStore',      label:'TAT Store',    isTAT:true },
    { key:'totalCbmStore', label:'CBM Store' },
    { key:'totalDoCust',   label:'DO Customer' },
    { key:'totalDpCust',   label:'DP Customer' },
  ];

  const fmt = (key, v) => {
    if(v==null) return '—';
    if(key==='olf') return (v*100).toFixed(1)+'%';
    if(key==='tatDirect'||key==='tatStore') return tatStr(v);
    if(key==='doDp'||key==='cbmDo'||key==='cbmDp') return v.toFixed(2);
    if(key==='totalDoCust'||key==='totalDpCust') return Math.round(v).toLocaleString('id-ID');
    if(key==='totalCbmStore') return v.toFixed(1);
    return v.toFixed(1);
  };

  // Build table rows using summary (ALL) or single site
  const vA = currentSite==='ALL' ? sumA : (resA[0]||{});
  const vB = currentSite==='ALL' ? sumB : (resB[0]||{});

  let tableRows = '';
  allMetrics.forEach(m => {
    const a=vA[m.key], b=vB[m.key];
    const delta = fmtDelta(a, b, m.key, HIGHER_BETTER[m.key]);
    tableRows += '<tr>'
      +'<td><strong>'+m.label+'</strong></td>'
      +'<td class="num col-a">'+fmt(m.key,a)+'</td>'
      +'<td class="num col-b">'+fmt(m.key,b)+'</td>'
      +'<td class="num">'+delta+'</td>'
      +'</tr>';
  });

  // Per-site rows if ALL — layout: rows=metrik, cols=site with A→B delta
  let siteSection = '';
  if(currentSite==='ALL') {
    // Build per-site grid: 5 site cards, each showing metrik rows
    let cards = '';
    SITES.forEach(site => {
      const a = resA.find(r=>r.site===site)||{};
      const b = resB.find(r=>r.site===site)||{};
      let rows = '';
      allMetrics.forEach(m => {
        const va = fmt(m.key,a[m.key]), vb = fmt(m.key,b[m.key]);
        const d = fmtDelta(a[m.key], b[m.key], m.key, HIGHER_BETTER[m.key]);
        rows += '<tr>'
          +'<td style="font-size:11px;color:var(--t2);padding:5px 8px;border-bottom:0.5px solid var(--border)">'+m.label+'</td>'
          +'<td class="num" style="font-size:11px;padding:5px 8px;border-bottom:0.5px solid var(--border);color:#1a73e8">'+va+'</td>'
          +'<td class="num" style="font-size:11px;padding:5px 8px;border-bottom:0.5px solid var(--border);color:#e37400">'+vb+'</td>'
          +'<td class="num" style="font-size:11px;padding:5px 8px;border-bottom:0.5px solid var(--border)">'+d+'</td>'
          +'</tr>';
      });
      cards += '<div style="background:var(--white);border:0.5px solid var(--border);border-radius:var(--r);overflow:hidden;min-width:0">'
        +'<div style="background:var(--bg);padding:7px 10px;font-size:11px;font-weight:600;color:var(--text);border-bottom:1px solid var(--border)">'+SL[site]+'</div>'
        +'<table style="width:100%;border-collapse:collapse"><thead>'
        +'<tr><th style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;padding:5px 8px;text-align:left;font-weight:600">Metrik</th>'
        +'<th style="font-size:9px;color:#1a73e8;text-transform:uppercase;letter-spacing:.5px;padding:5px 8px;text-align:right;font-weight:600">A</th>'
        +'<th style="font-size:9px;color:#e37400;text-transform:uppercase;letter-spacing:.5px;padding:5px 8px;text-align:right;font-weight:600">B</th>'
        +'<th style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;padding:5px 8px;text-align:right;font-weight:600">Δ</th>'
        +'</tr></thead><tbody>'+rows+'</tbody></table>'
        +'</div>';
    });
    siteSection = '<div class="panel" style="margin-top:14px"><div class="ph"><h3>Perbandingan per Site</h3><span class="tag">Periode A vs B</span></div>'
      +'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;padding:2px 0">'+cards+'</div></div>';
  }

  const labelA = s1+' — '+e1;
  const labelB = s2+' — '+e2;

  // Site cards html (strip outer panel wrapper from siteSection)
  var siteCardsHtml = '';
  if(siteSection) {
    var tmp = document.createElement('div');
    tmp.innerHTML = siteSection;
    var grid = tmp.querySelector('[style*="auto-fill"]');
    if(grid) siteCardsHtml = grid.innerHTML;
  }

  // Shorten date labels: "2026-03-31 — 2026-04-29" → "31 Mar — 29 Apr 26"
  function shortDate(s) {
    var mn=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
    return s.replace(/(\d{4})-(\d{2})-(\d{2})\s*—\s*(\d{4})-(\d{2})-(\d{2})/,
      function(_,y1,m1,d1,y2,m2,d2){
        return d1+' '+mn[+m1-1]+' '+y1.slice(2)+'<br>— '+d2+' '+mn[+m2-1]+' '+y2.slice(2);
      });
  }
  var hdrA = shortDate(labelA);
  var hdrB = shortDate(labelB);

  // ── Transposed summary table (metric = rows, A/B = cols) ──────
  // Reuse COLS config from monthly trend table
  const CMP_COLS = [
    { key:'ritase',   label:'Ritase',       fmt:function(v){return v!=null?v.toFixed(2):'—';},             tgt:function(site){return {JABABEKA:1.15,CIKUPA:1.05,SDA:1.07,TALLO:1.25,TAMORA:1.25}[site]||1.15;}, hi:true,  isTAT:false },
    { key:'olf',      label:'OLF (Store)',  fmt:function(v){return v!=null?(v*100).toFixed(1)+'%':'—';},    tgt:function(){return 0.85;},  hi:true,  isTAT:false },
    { key:'dpStore',  label:'DP (Store)',   fmt:function(v){return v!=null?v.toFixed(1):'—';},              tgt:null, hi:true,  isTAT:false },
    { key:'dpMix',    label:'DP (Mix)',     fmt:function(v){return v!=null?v.toFixed(1):'—';},              tgt:function(){return 8.0;},   hi:true,  isTAT:false },
    { key:'dpNonReg', label:'DP Non Reg',  fmt:function(v){return v!=null?v.toFixed(1):'—';},              tgt:null, hi:true,  isTAT:false },
    { key:'dpReg',    label:'DP (Regular)',fmt:function(v){return v!=null?v.toFixed(1):'—';},              tgt:function(){return 8.0;},   hi:true,  isTAT:false },
    { key:'doTrip',        label:'DO/Trip',      fmt:function(v){return v!=null?v.toFixed(1):'—';},                              tgt:function(){return 11.0;},  hi:true,  isTAT:false },
    { key:'tatDirect',     label:'TAT (Direct)', fmt:function(v){return tatStr(v);},                                             tgt:null, hi:false, isTAT:true  },
    { key:'tatStore',      label:'TAT (Store)',  fmt:function(v){return tatStr(v);},                                             tgt:null, hi:false, isTAT:true  },
    { key:'totalCbmStore', label:'CBM Store',    fmt:function(v){return v!=null?v.toFixed(1):'—';},                              tgt:null, hi:true,  isTAT:false },
    { key:'totalDoCust',   label:'DO Customer',  fmt:function(v){return v!=null?Math.round(v).toLocaleString('id-ID'):'—';},    tgt:null, hi:true,  isTAT:false },
    { key:'totalDpCust',   label:'DP Customer',  fmt:function(v){return v!=null?Math.round(v).toLocaleString('id-ID'):'—';},    tgt:null, hi:true,  isTAT:false },
  ];

  function cmpCellCls(key, val, site) {
    var col = CMP_COLS.find(function(c){return c.key===key;});
    if(!col||!col.tgt||val==null) return '';
    var effectiveSite = SUB_SITES[site] ? SUB_SITES[site].baseSite : (site==='ALL'?'JABABEKA':site);
    var t = col.tgt(effectiveSite);
    if(!t) return '';
    var pct = col.hi ? val/t : t/val;
    if(pct>=1.0) return 'c-grn';
    if(pct>=0.9) return 'c-yel';
    return 'c-red';
  }

  function cmpPctStr(key, val, site) {
    var col = CMP_COLS.find(function(c){return c.key===key;});
    if(!col||!col.tgt||val==null) return '';
    var effectiveSite = SUB_SITES[site] ? SUB_SITES[site].baseSite : (site==='ALL'?'JABABEKA':site);
    var t = col.tgt(effectiveSite);
    if(!t) return '';
    var pct = col.hi ? val/t*100 : t/val*100;
    return '<br><span class="pct">'+pct.toFixed(0)+'%</span>';
  }

  function tatBadge(key, a, b) {
    // TAT: lower is better. Compare A vs B: if A < B → A improved (green ▼), if A > B → A worse (red ▲)
    if(a==null||b==null) return '';
    var diff = a - b; // negative = A lower = better
    if(Math.abs(diff)<0.01) return '';
    var better = diff < 0; // A is lower than B = good
    var mins = Math.round(Math.abs(diff));
    var h = Math.floor(mins/60), m = mins%60;
    var label = (h>0?h+'j ':'')+m+'m';
    var arrow = better ? '▼' : '▲';
    var color = better ? '#0f9d58' : '#d93025';
    return ' <span style="font-size:10px;font-weight:700;color:'+color+'">'+arrow+' '+label+'</span>';
  }

  var site4cls = currentSite==='ALL' ? 'JABABEKA' : currentSite;
  var cmpRows = '';
  CMP_COLS.forEach(function(col) {
    var a = vA[col.key], b = vB[col.key];
    var clsA = cmpCellCls(col.key, a, site4cls);
    var clsB = cmpCellCls(col.key, b, site4cls);
    var pA = cmpPctStr(col.key, a, site4cls);
    var pB = cmpPctStr(col.key, b, site4cls);
    var badge = col.isTAT ? tatBadge(col.key, a, b) : '';
    cmpRows += '<tr>'
      +'<td style="font-size:11px;color:var(--t2);font-weight:600;padding:7px 10px;border-bottom:0.5px solid var(--border);white-space:nowrap">'+col.label+'</td>'
      +'<td class="num '+clsA+'" style="padding:7px 10px;border-bottom:0.5px solid var(--border);font-size:12px">'+col.fmt(a)+pA+'</td>'
      +'<td class="num '+clsB+'" style="padding:7px 10px;border-bottom:0.5px solid var(--border);font-size:12px">'+col.fmt(b)+pB+badge+'</td>'
      +'</tr>';
  });

  var summaryTable = '<table class="dt ins-tbl" style="font-size:11px;min-width:0;width:100%"><thead><tr>'
    +'<th style="width:130px;text-align:left;padding:7px 10px;font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px">Metrik</th>'
    +'<th class="num col-a" style="width:110px;padding:7px 10px;font-size:10px;letter-spacing:.3px">'+hdrA+'</th>'
    +'<th class="num col-b" style="width:110px;padding:7px 10px;font-size:10px;letter-spacing:.3px">'+hdrB+'</th>'
    +'</tr></thead><tbody>'+cmpRows+'</tbody></table>';

  var legendTag = '<span class="tag"><span style="color:#1a73e8">■</span> A &nbsp;<span style="color:#e37400">■</span> B</span>';

  var innerHtml = '';
  if(currentSite==='ALL' && siteCardsHtml) {
    innerHtml = '<div style="display:grid;grid-template-columns:400px 1fr;gap:16px;align-items:start">'
      +'<div><div style="font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px">Ringkasan</div>'+summaryTable+'</div>'
      +'<div><div style="font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px">Per Site</div>'
      +'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:8px">'+siteCardsHtml+'</div></div>'
      +'</div>';
  } else {
    innerHtml = summaryTable;
  }

  document.getElementById('cmpResult').innerHTML =
    '<div class="panel"><div class="ph"><h3>Perbandingan Periode</h3>'+legendTag+'</div>'
    +'<div style="padding:0 2px 4px">'+innerHtml+'</div>'
    +'</div>'
    +buildKesimpulan(resB, resB, sumA, sumB);
}

  const moNames = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];

  // allMonths: semua bulan dari ROWS (Jan → latest), apple-to-apple day range
  const {start:fs, end:fe} = getRange();
  const allMonths = [...new Set(ROWS.map(r=>r.date?r.date.slice(0,7):null).filter(Boolean))].sort();

    { key:'dpNonReg',label:'DP Non Reg',   fmt:v=>v!=null?v.toFixed(1):'—', tgt:null, hi:true  },

    { key:'doTrip',        label:'DO/Trip',      fmt:v=>v!=null?v.toFixed(1):'—',           tgt:function(){return 11.0;}, hi:true  },
    { key:'tatDirect',     label:'TAT (Direct)', fmt:v=>tatStr(v),                          tgt:null, hi:false },
    { key:'tatStore',      label:'TAT (Store)',  fmt:v=>tatStr(v),                          tgt:null, hi:false },
    { key:'totalCbmStore', label:'CBM Store',    fmt:v=>v!=null?v.toFixed(1):'—',           tgt:null, hi:true  },
    { key:'totalDoCust',   label:'DO Customer',  fmt:v=>v!=null?Math.round(v).toLocaleString('id-ID'):'—', tgt:null, hi:true  },

  const SITES_LIST = currentSite==='ALL' ? SITES : SUB_SITES[currentSite] ? [currentSite] : [currentSite];

  // Color cell based on achievement vs target
  function cellCls(key, val, site) {
    var col = COLS.find(c=>c.key===key);
    if(!col||!col.tgt||val==null) return 'c-def';
    var effectiveSite = SUB_SITES[site] ? SUB_SITES[site].baseSite : site;
    var t = col.tgt(effectiveSite);
    if(!t) return 'c-def';
    var pct = col.hi ? val/t : t/val;
    if(pct>=1.0) return 'c-grn';
    if(pct>=0.9) return 'c-yel';
    return 'c-red';
  }

  function pctStr(key, val, site) {
    var col = COLS.find(c=>c.key===key);
    if(!col||!col.tgt||val==null) return '';
    var effectiveSite = SUB_SITES[site] ? SUB_SITES[site].baseSite : site;
    var t = col.tgt(effectiveSite);
    if(!t) return '';
    var pct = col.hi ? val/t*100 : t/val*100;
    return '<br><span class="pct">'+pct.toFixed(0)+'%</span>';
  }

  // Build header
  var thead = '<tr><th>Bulan</th><th>Site</th>';
  COLS.forEach(c=>{ thead+='<th>'+c.label+'</th>'; });
  thead += '</tr>';

  // Build rows — compute from ROWS with exact date range (same as Achievement panel)
  var tbody = '';
  allMonths.forEach(function(mo) {
    var daysInMo = new Date(parseInt(mo.slice(0,4)), parseInt(mo.slice(5,7)), 0).getDate();
    var moD1 = mo+'-'+String(parseInt(fs.slice(8,10))).padStart(2,'0');
    var moD2 = mo+'-'+String(Math.min(parseInt(fe.slice(8,10)), daysInMo)).padStart(2,'0');
    SITES_LIST.forEach(function(site) {
      var moFiltered = filterRows(ROWS, moD1, moD2, site);
      if(!moFiltered.length) return;
      var res = computeSite(moFiltered, site)||{};
      var mn = moNames[parseInt(mo.slice(5,7))-1]+' '+mo.slice(0,4);
      var siteLbl = SL[site]||site;
      var tr = '<tr>';
      tr += '<td style="color:var(--t2)">'+mn+'</td><td>'+siteLbl+'</td>';
      COLS.forEach(function(c){
        var v = res[c.key];
        var cls = cellCls(c.key, v, site);
        tr += '<td class="'+cls+'">'+c.fmt(v)+pctStr(c.key, v, site)+'</td>';
      });
      tr += '</tr>';
      tbody += tr;
    });
  });

  container.innerHTML = '<table class="mtt"><thead>'+thead+'</thead><tbody>'+tbody+'</tbody></table>';
}

function renderDetail(results, summary, start, end) {
  const moNames = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  // Compute daily trend data for charts
  const {start:s, end:e} = getRange();
  const filtered = filterRows(ROWS, s, e, currentSite);

  // Build daily aggregates per metric for trend
  const dailyMap = {};
  filtered.forEach(r => {
    if(!dailyMap[r.date]) dailyMap[r.date] = [];
    dailyMap[r.date].push(r);
  });
  const dates = Object.keys(dailyMap).sort();

  const metrics = [
    { key:'olf',      label:'OLF',       fmt: v=>v!=null?(v*100).toFixed(1)+'%':'—' },
    { key:'ritase',   label:'Ritase',               fmt: v=>pf(v,2) },
    { key:'dpStore',  label:'DP Store',             fmt: v=>pf(v,1) },
    { key:'dpMix',    label:'DP Mix',               fmt: v=>pf(v,1) },
    { key:'dpNonReg', label:'DP Non Reg',       fmt: v=>pf(v,1) },
    { key:'dpReg',    label:'DP Reg',           fmt: v=>pf(v,1) },
    { key:'doTrip',   label:'DO/Trip',       fmt: v=>pf(v,1) },
    { key:'doDp',     label:'DO/DP Direct',         fmt: v=>pf(v,2) },
    { key:'cbmDo',    label:'CBM/DO',               fmt: v=>pf(v,2) },
    { key:'cbmDp',    label:'CBM/DP',               fmt: v=>pf(v,2) },
    { key:'tatDirect',label:'TAT Direct',           fmt: v=>tatStr(v) },
    { key:'tatStore', label:'TAT Store',            fmt: v=>tatStr(v) },
  ];

  // ── ACHIEVEMENT CARDS ─────────────────────────────────────────
  const achMetrics = [
    { key:'olf',    label:'OLF Store',   fmt:v=>v!=null?(v*100).toFixed(1)+'%':'—', tgtFmt:'Target ≥85%' },
    { key:'ritase', label:'Ritase',      fmt:v=>v!=null?v.toFixed(2):'—',           tgtFmt:(site)=>`Target ≥${getTarget('ritase',site)||1.15}` },
    { key:'dpMix',  label:'DP Mix',      fmt:v=>v!=null?v.toFixed(1):'—',           tgtFmt:'Target ≥8.0' },
    { key:'dpReg',  label:'DP Reg',  fmt:v=>v!=null?v.toFixed(1):'—',           tgtFmt:'Target ≥8.0' },
    { key:'doTrip', label:'DO/Trip',     fmt:v=>v!=null?v.toFixed(1):'—',           tgtFmt:'Target ≥11.0' },
  ];

  // For single site use that site result, for ALL use summary
  const achResults = currentSite==='ALL'
    ? results.map(r=>({...r, _isSite:true}))
    : results;

  // Build achievement cards per site or summary
  const achDisplay = currentSite==='ALL' ? [...results, {...summary, site:'NDC_RDC_AVG', label:'AVG'}] : results;

  let achCards = '';
  achDisplay.forEach(r => {
    const site = r.site;
    achMetrics.forEach(m => {
      const val = r[m.key];
      const tgt = typeof m.tgtFmt==='function' ? m.tgtFmt(site) : m.tgtFmt;
      const badge = achBadge(m.key, val, site);
      if(currentSite==='ALL' && r.site!=='NDC_RDC_AVG') return; // only show AVG cards when ALL
      achCards += `<div class="ach-card">
        <div class="ac-lbl">${m.label}${currentSite!=='ALL'?'':''}</div>
        <div class="ac-val">${m.fmt(val)}</div>
        <div class="ac-tgt">${tgt}</div>
        ${badge}
      </div>`;
    });
  });

  // Per-site achievement if single site
  let siteAchTable = '';
  function mkBadge(pct) {
    if(pct==null) return '';
    const cls = pct>=100?'hit':pct>=90?'warn':'miss';
    return '<span class="ac-badge '+cls+'">'+pct.toFixed(1)+'%</span>';
  }
  if(currentSite==='ALL') {
    let thead = '<tr><th>METRIK</th>';
    results.forEach(r=>{ thead += '<th class="num">'+r.label+'</th>'; });
    thead += '<th class="num">AVG</th></tr>';
    let tbody = '';
    achMetrics.forEach(m => {
      let tr = '<tr><td><strong>'+m.label+'</strong></td>';
      results.forEach(r => {
        const pct = achPct(m.key, r[m.key], r.site);
        tr += '<td class="num">'+m.fmt(r[m.key])+' '+mkBadge(pct)+'</td>';
      });
      const avgPct = achPct(m.key, summary[m.key], 'NATIONAL');
      tr += '<td class="num"><strong>'+m.fmt(summary[m.key])+'</strong> '+mkBadge(avgPct)+'</td></tr>';
      tbody += tr;
    });
    siteAchTable = '<div class="panel" style="margin-bottom:14px"><div class="ph"><h3>Achievement per Site</h3><span class="tag">vs target</span></div>'
      +'<div class="tw"><table class="dt"><thead>'+thead+'</thead><tbody>'+tbody+'</tbody></table></div></div>';
  } else {
    siteAchTable = '<div class="panel" style="margin-bottom:14px"><div class="ph"><h3>Achievement — '+(results[0]?.label||currentSite)+'</h3><span class="tag">vs target</span></div>'
      +'<div class="ach-grid" style="padding:14px 16px">'+achCards+'</div></div>';
  }

  // ── COMPARISON CONTROLS ────────────────────────────────────────
  const today = new Date().toISOString().slice(0,10);
  const prevMonthStart = new Date(new Date().getFullYear(), new Date().getMonth()-1, 1).toISOString().slice(0,10);
  const prevMonthEnd   = new Date(new Date().getFullYear(), new Date().getMonth(), 0).toISOString().slice(0,10);
  if(!cmpA.start) { cmpA.start=prevMonthStart; cmpA.end=prevMonthEnd; }
  if(!cmpB.start) { const {start:cs,end:ce}=getRange(); cmpB.start=cs; cmpB.end=ce; }

  document.getElementById('content').innerHTML = `
    ${currentSite==='ALL' ? siteAchTable : siteAchTable}
    <div class="g2" style="margin-bottom:14px">
      <div class="panel"><div class="ph"><h3>Ringkasan Metrik</h3><span class="tag">range terpilih</span></div>
        <div class="tw"><table class="dt"><thead><tr><th>METRIK</th>${results.map(r=>`<th class="num">${r.label}</th>`).join('')}<th class="num">AVG</th></tr></thead>
        <tbody>${metrics.map(m=>`
          <tr><td><strong>${m.label}</strong></td>
          ${results.map(r=>`<td class="num">${m.fmt(r[m.key])}</td>`).join('')}
          <td class="num"><strong>${m.fmt(summary[m.key])}</strong></td>
          </tr>`).join('')}
        </tbody></table></div>
      </div>
      <div class="panel"><div class="ph"><h3>OLF Store per Site</h3><span class="tag">% utilitas</span></div><div class="pb"><div style="height:200px;position:relative"><canvas id="dOLF"></canvas></div></div></div>
    </div>
    <div class="g2">
      <div class="panel"><div class="ph"><h3>TAT Direct vs Store</h3><span class="tag">jam rata-rata</span></div><div class="pb"><div style="height:200px;position:relative"><canvas id="dTAT"></canvas></div></div></div>
      <div class="panel"><div class="ph"><h3>Drop Point Breakdown</h3><span class="tag">Store / Mix / Reg / Non-Reg</span></div><div class="pb"><div style="height:200px;position:relative"><canvas id="dDP"></canvas></div></div></div>
    </div>
    <div class="panel" style="margin-bottom:14px">
      <div class="ph"><h3>DO/Trip & DO/DP</h3><span class="tag">efficiency</span></div><div class="pb"><div style="height:200px;position:relative"><canvas id="dDO"></canvas></div></div>
    </div>
    <div class="panel" style="margin-top:14px">
      <div class="ph"><h3>Trendline Bulanan</h3><span class="tag">berdasarkan filter periode & site</span></div>
      <div style="padding:4px 16px 8px;height:340px;position:relative;max-width:700px"><canvas id="dTREND"></canvas></div>
    </div>

    <!-- MONTHLY TREND TABLE -->
    <div class="panel" style="margin-top:14px">
      <div class="ph"><h3>Trend Bulanan per Site</h3><span class="tag">color = vs target</span></div>
      <div class="tw" id="monthlyTrendTable" style="padding:0 2px 4px"></div>
    </div>

    <!-- COMPARISON SECTION -->
    <div class="panel" style="margin-top:14px">
      <div class="ph"><h3>Perbandingan Periode</h3><span class="tag">MoM / custom</span></div>
      <div style="padding:12px 16px">
        <div class="cmp-ctrl" style="border:none;padding:0;margin-bottom:12px;background:none">
          <div class="cmp-period">
            <span class="cmp-dot-a"></span>
            <label>Periode A:</label>
            <input type="date" class="date-in" id="cmpAStart" value="${cmpA.start}">
            <span class="cmp-sep">—</span>
            <input type="date" class="date-in" id="cmpAEnd" value="${cmpA.end}">
          </div>
          <span style="color:var(--t3);font-size:13px;margin:0 8px">vs</span>
          <div class="cmp-period">
            <span class="cmp-dot-b"></span>
            <label>Periode B:</label>
            <input type="date" class="date-in" id="cmpBStart" value="${cmpB.start}">
            <span class="cmp-sep">—</span>
            <input type="date" class="date-in" id="cmpBEnd" value="${cmpB.end}">
          </div>
          <button class="btn-cmp" onclick="applyCmp()">Bandingkan</button>
        </div>
        <div id="cmpResult"><p style="color:var(--t3);font-size:12px">Pilih kedua periode lalu klik Bandingkan.</p></div>
      </div>
    </div>
  `;

  const labs = results.map(r=>r.label);
  const co = {
    responsive:true,
    plugins:{
      legend:{labels:{color:'#5f6368',font:{family:'Inter',size:10},boxWidth:10}},
      tooltip:{backgroundColor:'#fff',borderColor:'#e8eaed',borderWidth:1,titleColor:'#1a1d23',bodyColor:'#5f6368'},
      datalabels:{
        anchor:'end', align:'top', color:'#1a1d23',
        font:{family:'Inter',size:9,weight:'600'},
        formatter:(v)=>v!=null?v.toFixed(1):'',
        padding:2
      }
    },
    scales:{
      x:{ticks:{color:'#9aa0a6',font:{family:'Inter',size:10}},grid:{color:'#f5f6fa'}},
      y:{ticks:{color:'#9aa0a6',font:{family:'Inter',size:10}},grid:{color:'#f5f6fa'}}
    }
  };

  charts.dOLF = new Chart(document.getElementById('dOLF').getContext('2d'),{type:'bar',data:{labels:labs,datasets:[{label:'OLF',data:results.map(r=>r.olf!=null?+(r.olf*100).toFixed(2):null),backgroundColor:'rgba(52,168,90,.7)',borderColor:'#34a85a',borderWidth:1,borderRadius:4}]},options:{...co,scales:{...co.scales,y:{...co.scales.y,min:0,max:100}}}});

  // Build monthly trend table — deferred to not block main render
  setTimeout(function(){ buildMonthlyTrendTable(document.getElementById('monthlyTrendTable')); }, 50);

  charts.dTAT = new Chart(document.getElementById('dTAT').getContext('2d'),{type:'bar',data:{labels:labs,datasets:[
    {label:'TAT Direct',data:results.map(r=>r.tatDirect!=null?+r.tatDirect.toFixed(2):null),backgroundColor:'rgba(52,168,90,.7)',borderColor:'#34a85a',borderWidth:1,borderRadius:4},
    {label:'TAT Store',data:results.map(r=>r.tatStore!=null?+r.tatStore.toFixed(2):null),backgroundColor:'rgba(26,115,232,.6)',borderColor:'#1a73e8',borderWidth:1,borderRadius:4},
  ]},options:co});

  charts.dDP = new Chart(document.getElementById('dDP').getContext('2d'),{type:'bar',data:{labels:labs,datasets:[
    {label:'DP Store',data:results.map(r=>r.dpStore),backgroundColor:'rgba(52,168,90,.7)',borderColor:'#34a85a',borderWidth:1,borderRadius:4},
    {label:'DP Mix',data:results.map(r=>r.dpMix),backgroundColor:'rgba(26,115,232,.6)',borderColor:'#1a73e8',borderWidth:1,borderRadius:4},
    {label:'DP Reg',data:results.map(r=>r.dpReg),backgroundColor:'rgba(227,116,0,.5)',borderColor:'#e37400',borderWidth:1,borderRadius:4},
    {label:'DP Non Reg',data:results.map(r=>r.dpNonReg),backgroundColor:'rgba(217,48,37,.4)',borderColor:'#d93025',borderWidth:1,borderRadius:4},
  ]},options:{...co,scales:{...co.scales,y:{...co.scales.y,min:0}}}});

  charts.dDO = new Chart(document.getElementById('dDO').getContext('2d'),{type:'bar',data:{labels:labs,datasets:[
    {label:'DO/Trip',data:results.map(r=>r.doTrip),backgroundColor:'rgba(52,168,90,.7)',borderColor:'#34a85a',borderWidth:1,borderRadius:4},
    {label:'DO/DP',data:results.map(r=>r.doDp),backgroundColor:'rgba(227,116,0,.5)',borderColor:'#e37400',borderWidth:1,borderRadius:4},
  ]},options:co});

  // ── MONTHLY TRENDLINE ──────────────────────────────────────────
  const monthMap = {};
  filtered.forEach(r => {
    if(!r.date) return;
    const mo = r.date.slice(0,7);
    if(!monthMap[mo]) monthMap[mo] = [];
    monthMap[mo].push(r);
  });
  const months = Object.keys(monthMap).sort();
  const moLabels = months.map(m => {
    const [y,mn] = m.split('-');
    return moNames[parseInt(mn)-1] + ' ' + y;
  });
  const moData = months.map(mo => {
    const moRows = monthMap[mo] || [];
    return currentSite==='ALL' ? makeSummary(computeAll(moRows)) : (computeSite(moRows, currentSite) || {});
  });

  function mkTrend(label, color, data, yAxis, fmtFn, valign) {
    const al = valign||'top';
    return {
      label, yAxisID: yAxis,
      data,
      borderColor: color, backgroundColor: 'transparent',
      borderWidth: 2.5, pointRadius: 4, pointBackgroundColor: color,
      pointHoverRadius: 6, tension: 0.3, fill: false,
      datalabels: {
        display: function(ctx2){ return ctx2.dataIndex===0||ctx2.dataIndex===trendData.length-1; },
        anchor: al==='bottom'?'start':'end',
        align:  al,
        offset: al==='bottom'?-14:4,
        color, font:{family:'Inter', size:9, weight:'700'},
        formatter: v => v!=null ? fmtFn(v) : ''
      }
    };
  }

  // ── TRENDLINE: all months in data, values computed using filter day-range ──
  const filterD1 = parseInt(s.slice(8,10));
  const filterD2 = parseInt(e.slice(8,10));
  const allMonths = [...new Set(ROWS.map(r=>r.date?r.date.slice(0,7):null).filter(Boolean))].sort();
  const moNames2 = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  const trendLabels = allMonths.map(mo => {
    const [y,mn] = mo.split('-');
    return moNames2[parseInt(mn)-1] + ' ' + y;
  });

  // Each month uses same day-range as active filter (apple-to-apple)
  const trendData = allMonths.map(mo => {
    const daysInMonth = new Date(parseInt(mo.slice(0,4)), parseInt(mo.slice(5,7)), 0).getDate();
    const d1 = mo+'-'+String(filterD1).padStart(2,'0');
    const d2 = mo+'-'+String(Math.min(filterD2, daysInMonth)).padStart(2,'0');
    const moRows = filterRows(ROWS, d1, d2, currentSite);
    return currentSite==='ALL' ? makeSummary(computeAll(moRows)) : (computeSite(moRows, currentSite) || {});
  });

  const trendSeries = [
    { key:'olf',    label:'OLF',     color:'#e37400', axis:'yR', align:'top',    offset:6,  fmt:function(v){return v!=null?+(v*100).toFixed(1):null;}, disp:function(v){return v.toFixed(1)+'%';} },
    { key:'doTrip', label:'DO/Trip', color:'#1a73e8', axis:'yL', align:'top',    offset:10, fmt:function(v){return v!=null?+v.toFixed(1):null;},        disp:function(v){return v.toFixed(1);}     },
    { key:'dpReg',  label:'DP Reg',  color:'#d93025', axis:'yL', align:'top',    offset:6,  fmt:function(v){return v!=null?+v.toFixed(1):null;},        disp:function(v){return v.toFixed(1);}     },
    { key:'dpMix',  label:'DP Mix',  color:'#a142f4', axis:'yL', align:'bottom', offset:10, fmt:function(v){return v!=null?+v.toFixed(1):null;},        disp:function(v){return v.toFixed(1);}     },
    { key:'ritase', label:'Ritase',  color:'#555',    axis:'yL', align:'center', offset:0,  fmt:function(v){return v!=null?+v.toFixed(2):null;},        disp:function(v){return v.toFixed(2);}     },
  ];

  var endLabelPlugin = {
    id: 'endLabel',
    afterDatasetsDraw: function(chart) {
      var ctx=chart.ctx, right=chart.chartArea.right;
      trendSeries.forEach(function(s,i) {
        var meta=chart.getDatasetMeta(i);
        if(meta.hidden) return;
        // Also skip if dataset was marked hidden (no data)
        if(trendDatasets[i] && trendDatasets[i].hidden) return;
        var last=meta.data[meta.data.length-1];
        if(!last) return;
        ctx.save();
        ctx.font='bold 10px Inter,sans-serif';
        ctx.fillStyle=s.color;
        ctx.textAlign='left';
        ctx.textBaseline='middle';
        ctx.fillText(s.label, right+8, last.y);
        ctx.restore();
      });
    }
  };

  var trendDatasets = trendSeries.map(function(s) {
    // Check if series has any meaningful data
    var vals = trendData.map(function(d){ return s.fmt(d[s.key]); });
    var hasData = vals.some(function(v){ return v != null && v !== 0; });
    return {
      label: s.label,
      data: vals,
      borderColor: s.color, pointBackgroundColor: s.color,
      backgroundColor: 'transparent',
      borderWidth: 2.5, pointRadius: 5, pointHoverRadius: 7,
      tension: 0.3, fill: false, yAxisID: s.axis,
      hidden: !hasData,
      datalabels: {
        display: hasData,
        anchor: s.align==='center'?'center':(s.align==='bottom'?'start':'end'),
        align:  s.align==='center'?'center':(s.align==='bottom'?'bottom':'top'),
        offset: s.align==='center'?0:s.offset,
        color: s.key==='ritase'?'#fff':s.color,
        font: {family:'Inter', size:9, weight:'700'},
        formatter: function(v,ctx2){
          return v!=null ? String(v)+(s.key==='olf'?'%':'') : '';
        },
        backgroundColor: s.key==='ritase'?'rgba(40,40,40,0.85)':'rgba(255,255,255,0.9)',
        borderRadius: 3, padding:{top:1,bottom:1,left:2,right:2}
      }
    };
  });

  charts.dTREND = new Chart(document.getElementById('dTREND').getContext('2d'), {
    type: 'line',
    data: { labels: trendLabels, datasets: trendDatasets },
    plugins: [endLabelPlugin],
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor:'#fff', borderColor:'#e8eaed', borderWidth:1,
          titleColor:'#1a1d23', bodyColor:'#5f6368',
          callbacks: { label: function(ctx) {
            var s=trendSeries[ctx.datasetIndex];
            var raw=trendData[ctx.dataIndex][s.key];
            return s.label+': '+(raw!=null?s.disp(raw):'—');
          }}
        },
        datalabels: { clip: false }
      },
      scales: {
        x: { ticks:{color:'#9aa0a6',font:{family:'Inter',size:11}}, grid:{color:'#f0f0f0'} },
        yL: { display:false, min:0, max:40 },
        yR: { display:false, min:0, max:100 }
      },
      layout: { padding:{ top:22, right:80, bottom:8, left:4 } }
    }
  });
}

// ── COMPARISON APPLY ───────────────────────────────────────────
function applyCmp() {
  cmpA.start = document.getElementById('cmpAStart')?.value || '';
  cmpA.end   = document.getElementById('cmpAEnd')?.value   || '';
  cmpB.start = document.getElementById('cmpBStart')?.value || '';
  cmpB.end   = document.getElementById('cmpBEnd')?.value   || '';
  renderComparison();
}

// ── CONTROLS ───────────────────────────────────────────────────
function setNav(n) {
  currentNav = n;
  ['overview','detail'].forEach(x=>{
    document.getElementById('nav-'+x)?.classList.toggle('active', x===n);
  });
  render();
}

// ── INIT ───────────────────────────────────────────────────────
updateSidebarActive();
loadData();
</script>
